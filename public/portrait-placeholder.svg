<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-labelledby="portraitTitle">
  <title id="portraitTitle">Platzhalter für ein Porträtfoto des Pflegeberaters</title>
  <rect width="480" height="480" rx="24" fill="#e3f1ef"/>
  <circle cx="240" cy="240" r="170" fill="#f2f9f8"/>
  <!-- head -->
  <circle cx="240" cy="196" r="66" fill="#bcd4d0"/>
  <!-- shoulders -->
  <path d="M120 400 q0 -96 120 -96 q120 0 120 96 v14 h-240 Z" fill="#bcd4d0"/>
  <!-- collar (scrubs hint) -->
  <path d="M204 310 l36 34 l36 -34 l-14 -8 l-22 22 l-22 -22 Z" fill="#2a7a72"/>
  <!-- stethoscope -->
  <path d="M206 320 q-20 44 6 72" stroke="#1f5f5b" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="218" cy="398" r="13" fill="#1f5f5b"/>
  <circle cx="218" cy="398" r="6" fill="#e3f1ef"/>
</svg>
