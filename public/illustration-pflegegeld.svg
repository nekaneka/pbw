<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-labelledby="pflegegeldTitle">
  <title id="pflegegeldTitle">Illustration: Pflegegeld-Antrag mit Checkliste, Beratungsmappe und Prüfsiegel</title>

  <!-- soft backdrop -->
  <rect x="0" y="0" width="480" height="420" rx="20" fill="#dfe9dd"/>

  <!-- folder behind (with subtle red-white-red tab marker) -->
  <rect x="64" y="96" width="264" height="230" rx="14" fill="#d9c69f"/>
  <path d="M64 118 v-14 a12 12 0 0 1 12 -12 h84 l14 16 Z" fill="#cdb98f"/>
  <g>
    <rect x="298" y="88" width="30" height="9" fill="#b5493f"/>
    <rect x="298" y="97" width="30" height="9" fill="#faf7f2"/>
    <rect x="298" y="106" width="30" height="9" fill="#b5493f"/>
  </g>

  <!-- form sheet -->
  <rect x="126" y="62" width="212" height="288" rx="10" fill="#ffffff" stroke="#e0ddd4" stroke-width="2"/>
  <!-- form header -->
  <rect x="148" y="88" width="128" height="12" rx="6" fill="#175249"/>
  <rect x="148" y="108" width="88" height="8" rx="4" fill="#c9c4b8"/>

  <!-- checklist rows -->
  <g>
    <rect x="148" y="140" width="18" height="18" rx="4" fill="none" stroke="#1d6357" stroke-width="3"/>
    <path d="M151 149 l5 6 l9 -11" stroke="#1d6357" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="178" y="145" width="118" height="9" rx="4.5" fill="#d8d4ca"/>

    <rect x="148" y="176" width="18" height="18" rx="4" fill="none" stroke="#1d6357" stroke-width="3"/>
    <path d="M151 185 l5 6 l9 -11" stroke="#1d6357" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="178" y="181" width="100" height="9" rx="4.5" fill="#d8d4ca"/>

    <rect x="148" y="212" width="18" height="18" rx="4" fill="none" stroke="#1d6357" stroke-width="3"/>
    <path d="M151 221 l5 6 l9 -11" stroke="#1d6357" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="178" y="217" width="110" height="9" rx="4.5" fill="#d8d4ca"/>

    <rect x="148" y="248" width="18" height="18" rx="4" fill="none" stroke="#1d6357" stroke-width="3"/>
    <rect x="178" y="253" width="84" height="9" rx="4.5" fill="#d8d4ca"/>
  </g>

  <!-- signature line -->
  <path d="M148 312 q14 -12 24 0 q10 12 22 -2" stroke="#26302f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="148" y1="322" x2="250" y2="322" stroke="#c9c4b8" stroke-width="2.5"/>

  <!-- seal: ring with care heart -->
  <g>
    <circle cx="352" cy="292" r="46" fill="#faf7f2" stroke="#a07c2e" stroke-width="4"/>
    <circle cx="352" cy="292" r="36" fill="none" stroke="#a07c2e" stroke-width="2" stroke-dasharray="4 5"/>
    <path d="M352 306 c-14 -10 -22 -17 -22 -26 c0 -12 16 -16 22 -5 c6 -11 22 -7 22 5 c0 9 -8 16 -22 26 Z" fill="#1d6357"/>
  </g>

  <!-- pen -->
  <g transform="rotate(-32 118 348)">
    <rect x="76" y="340" width="84" height="14" rx="7" fill="#175249"/>
    <path d="M160 340 l18 7 l-18 7 Z" fill="#d9b45f"/>
    <rect x="70" y="340" width="12" height="14" rx="4" fill="#a07c2e"/>
  </g>
</svg>
