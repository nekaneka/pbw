<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-labelledby="heroImgTitle">
  <title id="heroImgTitle">Illustration: Pflegeberater im Gespräch mit einer älteren Person</title>

  <!-- background -->
  <ellipse cx="350" cy="278" rx="320" ry="228" fill="#e3f1ef"/>
  <ellipse cx="358" cy="470" rx="252" ry="22" fill="#d5e2e0"/>

  <!-- window hint -->
  <rect x="452" y="96" width="132" height="112" rx="12" fill="#f2f9f8" stroke="#c6ddd9" stroke-width="4"/>
  <line x1="518" y1="100" x2="518" y2="204" stroke="#c6ddd9" stroke-width="4"/>
  <line x1="456" y1="152" x2="580" y2="152" stroke="#c6ddd9" stroke-width="4"/>
  <circle cx="490" cy="128" r="12" fill="#ffd9a0"/>

  <!-- plant -->
  <g>
    <path d="M116 388 C 96 348, 94 316, 114 288 C 123 320, 123 352, 121 388 Z" fill="#338c83"/>
    <path d="M131 388 C 150 354, 156 326, 145 298 C 133 324, 127 356, 127 388 Z" fill="#2a7a72"/>
    <path d="M107 386 C 86 368, 76 348, 78 326 C 95 344, 105 366, 111 386 Z" fill="#5aa79d"/>
    <path d="M94 386 h60 l-9 62 h-42 Z" fill="#d09a6a"/>
    <path d="M94 386 h60 l-2.5 17 h-55 Z" fill="#c08753"/>
  </g>

  <!-- floating heart -->
  <path d="M352 88 c-9 -19 -38 -14 -38 7 c0 16 21 28 38 40 c17 -12 38 -24 38 -40 c0 -21 -29 -26 -38 -7 Z" fill="#e2726e"/>
  <path d="M300 132 c-5 -10 -20 -7 -20 4 c0 8 11 15 20 21 c9 -6 20 -13 20 -21 c0 -11 -15 -14 -20 -4 Z" fill="#f0a09d"/>

  <!-- ===== caregiver (standing, left) ===== -->
  <g>
    <!-- legs -->
    <rect x="252" y="372" width="20" height="82" rx="10" fill="#1f5f5b"/>
    <rect x="282" y="372" width="20" height="82" rx="10" fill="#1f5f5b"/>
    <!-- shoes -->
    <path d="M246 448 h36 a8 8 0 0 1 8 8 v6 h-44 Z" fill="#26302f"/>
    <path d="M276 448 h36 a8 8 0 0 1 8 8 v6 h-44 Z" fill="#26302f"/>
    <!-- torso (scrubs) -->
    <path d="M240 262 q37 -20 74 0 q12 62 8 118 h-90 q-4 -56 8 -118 Z" fill="#2a7a72"/>
    <!-- badge -->
    <rect x="292" y="290" width="16" height="20" rx="3" fill="#f2f9f8"/>
    <!-- left arm resting -->
    <path d="M247 276 q-18 38 -10 74" stroke="#2a7a72" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="240" cy="356" r="11" fill="#f2c9a5"/>
    <!-- right arm reaching toward the elderly person -->
    <path d="M308 276 q48 20 74 50" stroke="#2a7a72" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="386" cy="330" r="12" fill="#f2c9a5"/>
    <!-- neck + head -->
    <rect x="266" y="228" width="24" height="26" rx="10" fill="#f2c9a5"/>
    <circle cx="278" cy="202" r="33" fill="#f2c9a5"/>
    <!-- hair -->
    <path d="M246 198 a33 33 0 0 1 60 -16 q-8 -18 -30 -18 q-28 0 -32 30 Z" fill="#42392f"/>
    <!-- face -->
    <circle cx="268" cy="204" r="3.2" fill="#26302f"/>
    <circle cx="290" cy="204" r="3.2" fill="#26302f"/>
    <path d="M270 218 q9 8 18 0" stroke="#26302f" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== elderly person (seated, right) ===== -->
  <g>
    <!-- armchair back -->
    <rect x="478" y="232" width="118" height="196" rx="24" fill="#b9d6d1"/>
    <!-- person: head -->
    <circle cx="470" cy="256" r="30" fill="#f2c9a5"/>
    <!-- grey hair -->
    <path d="M442 250 a30 30 0 0 1 54 -16 q-6 -16 -27 -16 q-25 0 -27 32 Z" fill="#cfd6d6"/>
    <circle cx="447" cy="236" r="9" fill="#cfd6d6"/>
    <!-- face -->
    <circle cx="461" cy="258" r="3" fill="#26302f"/>
    <circle cx="481" cy="258" r="3" fill="#26302f"/>
    <path d="M463 271 q8 7 16 0" stroke="#26302f" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- torso (cardigan) -->
    <path d="M440 288 q30 -14 60 0 q10 44 8 84 h-76 q-2 -40 8 -84 Z" fill="#95a7b5"/>
    <!-- arm toward caregiver's hand -->
    <path d="M444 300 q-30 16 -50 26" stroke="#95a7b5" stroke-width="20" stroke-linecap="round" fill="none"/>
    <circle cx="392" cy="328" r="10" fill="#f2c9a5"/>
    <!-- lap / blanket -->
    <path d="M420 366 h96 a14 14 0 0 1 14 14 v14 h-124 v-14 a14 14 0 0 1 14 -14 Z" fill="#7fb3ab"/>
    <!-- lower legs -->
    <rect x="428" y="392" width="18" height="60" rx="9" fill="#6e7f8c"/>
    <rect x="456" y="392" width="18" height="60" rx="9" fill="#6e7f8c"/>
    <!-- shoes -->
    <path d="M420 446 h34 a8 8 0 0 1 8 8 v6 h-42 Z" fill="#4d4238"/>
    <path d="M448 446 h34 a8 8 0 0 1 8 8 v6 h-42 Z" fill="#4d4238"/>
    <!-- chair seat front + armrest -->
    <rect x="466" y="398" width="142" height="34" rx="14" fill="#a3c6c0"/>
    <rect x="586" y="290" width="30" height="142" rx="15" fill="#a3c6c0"/>
    <!-- cane -->
    <line x1="620" y1="330" x2="632" y2="452" stroke="#8b6a4a" stroke-width="8" stroke-linecap="round"/>
    <path d="M604 332 a16 14 0 0 1 18 -12" stroke="#8b6a4a" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
